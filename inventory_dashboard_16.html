<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盤點中心管理儀表板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #0f1117; color: #dde1ec; }

/* ── Topbar ── */
.topbar { background: #191b24; border-bottom: 1px solid #252836; padding: 0 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 20; }
.topbar-brand { font-size: 13px; font-weight: 600; color: #eef0f8; padding: 14px 16px 14px 0; border-right: 1px solid #252836; margin-right: 4px; white-space: nowrap; }
.topbar-brand span { font-weight: 400; color: #8890b0; margin-left: 6px; font-size: 11px; }
.nav-tabs { display: flex; overflow-x: auto; flex: 1; }
.nav-tab { display: flex; align-items: center; gap: 7px; padding: 14px 16px; cursor: pointer; font-size: 13px; color: #7b80a0; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; flex-shrink: 0; }
.nav-tab:hover { color: #c0c4d8; }
.nav-tab.active { color: #eef0f8; font-weight: 500; }

.panel { display: none; padding: 20px; flex-direction: column; gap: 16px; }
.panel.active { display: flex; }

/* ── Period bar ── */
.period-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.period-label { font-size: 11px; color: #8890b0; font-weight: 500; letter-spacing: 0.04em; white-space: nowrap; }
.period-tabs { display: flex; border: 1px solid #2e3148; border-radius: 8px; overflow: hidden; background: #191b24; }
.period-tab { padding: 6px 13px; font-size: 12px; color: #8890b0; cursor: pointer; white-space: nowrap; transition: background 0.12s; }
.period-tab:not(:last-child) { border-right: 1px solid #2e3148; }
.period-tab.active { color: #eef0f8; font-weight: 500; }
.period-range { margin-left: auto; font-size: 11px; color: #8890b0; background: #191b24; border: 1px solid #2e3148; border-radius: 6px; padding: 5px 12px; white-space: nowrap; }

/* ── Legend ── */
.legend-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #191b24; border: 1px solid #252836; border-radius: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a0a4bc; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kpi-dash { width: 20px; height: 0; border-top: 2px dashed #e05c6e; }

/* ── Headcount summary ── */
.info-bar { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
.info-card { border-radius: 8px; padding: 14px 16px; background: #191b24; border: 1px solid #252836; }
.info-val { font-size: 24px; font-weight: 600; color: #eef0f8; }
.info-lbl { font-size: 11px; color: #8890b0; margin-top: 3px; }
.info-date { font-size: 10px; color: #9b7ef0; margin-top: 4px; font-weight: 500; }

/* ── Dept block ── */
.dept-block { background: #191b24; border: 1px solid #252836; border-radius: 10px; overflow: hidden; }
.dept-header { padding: 11px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #252836; background: #14151e; }
.dept-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dept-name { font-size: 13px; font-weight: 500; color: #eef0f8; }
.dept-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.type-field { background: #162a22; color: #2dd4a0; }
.type-admin { background: #1e2030; color: #7b7f96; }
.dept-subtotal { margin-left: auto; font-size: 11px; color: #8890b0; }
.manager-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid #1e2030; background: #16182200; }
.manager-label { font-size: 11px; color: #8890b0; }

/* ── HC Table ── */
.hc-table { width: 100%; border-collapse: collapse; }
.hc-table th { font-size: 10px; font-weight: 600; color: #8890b0; padding: 7px 12px; text-align: center; background: #14151e; border-bottom: 1px solid #252836; white-space: nowrap; }
.hc-table th:first-child { text-align: left; }
.hc-table td { font-size: 12px; padding: 10px 12px; border-bottom: 1px solid #1d1f2c; vertical-align: middle; color: #d4d8ea; }
.hc-table tr:last-child td { border-bottom: none; }
.hc-table tr:hover td { background: #1c1e2a; }
.total-cell { text-align: center; }
.bar-track { height: 5px; background: #252836; border-radius: 3px; overflow: hidden; margin-top: 4px; }
.bar-fill { height: 100%; border-radius: 3px; }
.spec-cell { text-align: center; }
.spec-pct-num { font-size: 17px; font-weight: 600; }
.spec-count-lbl { font-size: 10px; color: #8890b0; margin-top: 1px; }
.spec-bar-wrap { height: 5px; background: #252836; border-radius: 3px; overflow: hidden; margin-top: 4px; }
.spec-bar-fill { height: 100%; border-radius: 3px; }
.spec-high { color: #2dd4a0; }
.spec-mid  { color: #f4c04a; }
.spec-low  { color: #e05c6e; }
.title-cell { display: flex; flex-wrap: wrap; gap: 4px; }
.title-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; font-weight: 500; }
/* 職稱 pills — dark theme */
.pill-經理    { background: #2a1e40; color: #d8a8ff; border: 1px solid #4a3070; }
.pill-課長    { background: #162a22; color: #2dd4a0; border: 1px solid #1d4035; }
.pill-助理高專 { background: #152236; color: #70c0ff; border: 1px solid #1c4060; }
.pill-資深專員 { background: #1a2d30; color: #5edfd6; border: 1px solid #1e4e52; }
.pill-專員    { background: #1d2640; color: #a8b8d8; border: 1px solid #2c3858; }
.pill-事務專員 { background: #201e38; color: #a8a4d0; border: 1px solid #2e2c50; }
.pill-中階助理 { background: #1e2234; color: #8890b0; border: 1px solid #2e3248; }
.pill-初階助理 { background: #1c1e30; color: #7278a0; border: 1px solid #282c44; }

/* ── Quality ── */
.quality-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.q-dept-block { background: #191b24; border: 1px solid #252836; border-radius: 10px; overflow: hidden; }
.dept-rates { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #252836; }
.dept-rate-cell { padding: 12px 10px; text-align: center; border-right: 1px solid #252836; background: #14151e; }
.dept-rate-cell:last-child { border-right: none; }
.rate-type { font-size: 10px; color: #8890b0; margin-bottom: 4px; }
.rate-val { font-size: 19px; font-weight: 600; }
.rate-kpi-note { font-size: 10px; color: #6870a0; margin-top: 2px; }
/* 7欄位：課別 + 平均(品項/件數/金額) + 誤盤率(品項/件數/金額) */
.course-group-header { display: grid; grid-template-columns: 90px repeat(3,1fr) repeat(3,1fr); padding: 5px 14px 0; background: #14151e; }
.col-group-label { font-size: 10px; font-weight: 500; text-align: center; padding-bottom: 4px; letter-spacing: 0.03em; }
.col-group-avg { color: #4da8f8; border-bottom: 2px solid #1e3a60; }
.col-group-err { color: #f4874a; border-bottom: 2px solid #60301a; }
.course-header-row { display: grid; grid-template-columns: 90px repeat(3,1fr) repeat(3,1fr); padding: 5px 14px; background: #14151e; border-bottom: 1px solid #252836; }
.col-label { font-size: 10px; color: #8890b0; font-weight: 500; text-align: center; }
.col-label:first-child { text-align: left; }
.q-course-row { display: grid; grid-template-columns: 90px repeat(3,1fr) repeat(3,1fr); padding: 9px 14px; border-bottom: 1px solid #1d1f2c; align-items: center; }
.q-course-row:last-child { border-bottom: none; }
.q-course-row { cursor: pointer; transition: background 0.12s; }
.q-course-row:hover { background: #1c1e2a; }
.q-person-toggle { font-size: 9px; color: #545770; margin-left: 5px; display: inline-block; transition: transform 0.15s; vertical-align: middle; }
.q-person-panel { display: none; border-top: 1px solid #1d1f2c; background: #13141c; }
.q-person-panel.open { display: block; }
.q-person-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.q-person-table th { font-size: 10px; font-weight: 500; color: #8890b0; padding: 6px 8px; text-align: center; background: #0f1117; border-bottom: 1px solid #252836; white-space: nowrap; }
.q-person-table th:first-child { text-align: left; padding-left: 14px; }
.q-person-table th:nth-child(2) { text-align: left; }
.q-person-table td { padding: 6px 8px; border-bottom: 1px solid #191b24; text-align: center; color: #c0c4d8; font-size: 11px; }
.q-person-table td:first-child { text-align: left; padding-left: 14px; font-size: 12px; color: #eef0f8; }
.q-person-table td:nth-child(2) { text-align: left; color: #8890b0; font-size: 10px; }
.q-person-table tr:last-child td { border-bottom: none; }
.q-person-table tbody tr:nth-child(odd) { background: #161a22; }
.q-person-table tbody tr:nth-child(even) { background: #111318; }
.q-person-table tr:hover td { background: #1e2232 !important; }
.q-person-nc { color: #545770; font-style: italic; font-size: 10px; }
.q-person-footer { font-size: 10px; color: #6870a0; padding: 5px 14px 8px; background: #0f1117; border-top: 1px solid #1d1f2c; }
/* avg cell in course row */
.avg-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.avg-num { font-size: 12px; font-weight: 500; color: #a8c8e8; }
.avg-na  { font-size: 11px; color: #3a3f58; }
.q-course-name { font-size: 12px; font-weight: 500; color: #d4d8ea; line-height: 1.5; }
.q-course-sub { font-size: 10px; color: #8890b0; }
.rate-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.rate-num { font-size: 12px; font-weight: 600; }
.ok   { color: #2dd4a0; }
.warn { color: #f4c04a; }
.over { color: #e05c6e; }
.mini-bar-wrap { width: 100%; max-width: 60px; height: 4px; background: #252836; border-radius: 2px; position: relative; }
.mini-bar-fill { height: 100%; border-radius: 2px; position: absolute; top:0; left:0; }
.kpi-marker { position: absolute; top:-4px; height:12px; width:2px; background:#e05c6e; border-radius:1px; }

/* ── Efficiency ── */
.eff-dept-block { background: #191b24; border: 1px solid #252836; border-radius: 10px; overflow: hidden; }
.eff-table { width: 100%; border-collapse: collapse; }
.eff-table th { font-size: 10px; font-weight: 600; color: #8890b0; padding: 7px 10px; text-align: center; background: #14151e; border-bottom: 1px solid #252836; white-space: nowrap; }
.eff-table th:first-child { text-align: left; padding-left: 16px; }
.eff-table td { font-size: 12px; padding: 9px 10px; text-align: center; border-bottom: 1px solid #1d1f2c; vertical-align: middle; color: #d4d8ea; }
.eff-table td:first-child { text-align: left; padding-left: 16px; font-weight: 500; }
.eff-table tr:last-child td { border-bottom: none; }
.eff-table tr:hover td { background: #1c1e2a; }
.pct-badge { display: inline-flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; line-height: 1.5; }
.pct-high { color: #e05c6e; }
.pct-mid  { color: #f4c04a; }
.pct-low  { color: #2dd4a0; }
.inv-cell { display: flex; flex-direction: column; gap: 3px; min-width: 220px; }
.inv-row  { display: flex; align-items: center; gap: 6px; }
.inv-label { font-size: 10px; color: #545770; width: 68px; flex-shrink: 0; text-align: right; }
.inv-bar-wrap { flex: 1; height: 8px; background: #252836; border-radius: 3px; overflow: hidden; }
.inv-bar-fill { height: 100%; border-radius: 3px; }
.inv-num { font-size: 10px; color: #8890b0; width: 50px; text-align: right; flex-shrink: 0; white-space: nowrap; }
.inv-c0 { background: #1e3d6e; }
.inv-c1 { background: #1a6080; }
.inv-c2 { background: #1a8f7a; }
.inv-c3 { background: #2dd4a0; }
.inv-c4 { background: #9b7ef0; }

/* ── Team Analysis ── */
.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.team-section { background: #191b24; border: 1px solid #252836; border-radius: 10px; overflow: hidden; }
.team-section-header { padding: 11px 16px; background: #14151e; border-bottom: 1px solid #252836; font-size: 13px; font-weight: 500; color: #eef0f8; }
.team-section-sub { font-size: 11px; color: #8890b0; margin-left: 8px; font-weight: 400; }
.team-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.team-table th { padding: 7px 10px; text-align: center; font-weight: 500; color: #8890b0; background: #14151e; border-bottom: 1px solid #252836; font-size: 11px; }
.team-table td { padding: 7px 10px; border-bottom: 1px solid #1d1f2c; text-align: center; vertical-align: middle; color: #d4d8ea; }
.team-table tr:last-child td { border-bottom: none; }
.team-table tr:hover td { background: #1c1e2a; }
.team-rank { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
.rank-top { background: #162a22; color: #2dd4a0; }
.rank-bot { background: #2a1520; color: #e05c6e; }
.rank-mid { background: #1e2030; color: #545770; }
.eff-badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.eff-fast { background: #162a22; color: #2dd4a0; }
.eff-avg  { background: #252018; color: #f4c04a; }
.eff-slow { background: #2a1520; color: #e05c6e; }
.name-chip { display: inline-block; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 600; text-align: center; line-height: 28px; }
.combo-chip { display: inline-flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
.char-dot { display: inline-block; width: 24px; height: 24px; border-radius: 50%; background: #252836; color: #c0c4d8; font-size: 11px; font-weight: 600; text-align: center; line-height: 24px; }
.team-note { font-size: 10px; color: #6870a0; padding: 8px 16px; background: #14151e; border-top: 1px solid #252836; }
.eff-idx-val { font-size: 14px; font-weight: 700; }
.eff-idx-unit { font-size: 9px; color: #8890b0; }

/* ── Coming soon ── */
.coming-panel { background: #191b24; border: 1px solid #252836; border-radius: 10px; padding: 56px 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.cs-label { font-size: 14px; font-weight: 500; color: #a0a4bc; }
.cs-hint { font-size: 12px; color: #6870a0; text-align: center; line-height: 1.7; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">盤點中心 <span>管理儀表板</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-color="#9b7ef0" id="tab-headcount" onclick="setTab('headcount')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="5" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 14c0-2.5 1.8-4 4-4s4 1.5 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="11.5" cy="5.5" r="1.7" stroke="currentColor" stroke-width="1.2"/><path d="M11.5 10c2 0 3 1.2 3 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      各課人力狀況
    </div>
    <div class="nav-tab" data-color="#2dd4a0" id="tab-quality" onclick="setTab('quality')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2L9.5 6H14L10.5 8.5L12 12.5L8 10L4 12.5L5.5 8.5L2 6H6.5L8 2Z" stroke="currentColor" stroke-width="1.2"/></svg>
      盤點品質分析
    </div>
    <div class="nav-tab" data-color="#4da8f8" id="tab-efficiency" onclick="setTab('efficiency')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="5" rx="0.6" fill="currentColor"/><rect x="6.5" y="6" width="3" height="8" rx="0.6" fill="currentColor"/><rect x="11" y="3" width="3" height="11" rx="0.6" fill="currentColor"/></svg>
      盤點效率分析
    </div>
    <div class="nav-tab" data-color="#f4874a" id="tab-team" onclick="setTab('team')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="4.5" cy="5" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M1 13c0-2 1.5-3.2 3.5-3.2S8 11 8 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="11.5" cy="5" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M8 13c0-2 1.5-3.2 3.5-3.2S15 11 15 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      小組效率分析
    </div>
    <div class="nav-tab" data-color="#f4c04a" id="tab-pnl" onclick="setTab('pnl')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5V8.5L10.5 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      部門損益分析
    </div>
  </div>
</div>

<!-- 各課人力狀況 -->
<div class="panel active" id="panel-headcount"></div>

<!-- 盤點品質分析 -->
<div class="panel" id="panel-quality">
  <div class="period-bar">
    <div class="period-label">統計週期</div>
    <div class="period-tabs" id="quality-period-tabs"></div>
    <div class="period-range" id="quality-period-range"></div>
  </div>
  <div class="legend-row">
    <div class="legend-item"><div class="leg-dot" style="background:#1D9E75"></div>達標（低於 KPI 50% 以下）</div>
    <div class="legend-item"><div class="leg-dot" style="background:#EF9F27"></div>注意（KPI 50%～100%）</div>
    <div class="legend-item"><div class="leg-dot" style="background:#E24B4A"></div>超標（超過 KPI）</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:#8890b0"><div class="kpi-dash"></div>KPI 門檻 0.06%</div>
  </div>
  <div class="quality-grid" id="quality-grid"></div>
</div>

<!-- 盤點效率分析 -->
<div class="panel" id="panel-efficiency">
  <div class="period-bar">
    <div class="period-label">統計週期</div>
    <div class="period-tabs">
      <div class="period-tab active">115/04/02～04/14</div>
    </div>
    <div class="period-range">統計區間：115/04/02 ～ 115/04/14</div>
  </div>
  <div class="legend-row">
    <div class="legend-item"><div class="leg-dot" style="background:#E24B4A"></div>人力偏少佔比偏高（≥35%）</div>
    <div class="legend-item"><div class="leg-dot" style="background:#EF9F27"></div>中等（20～35%）</div>
    <div class="legend-item"><div class="leg-dot" style="background:#1D9E75"></div>偏低（&lt;20%）</div>
    <div style="margin-left:auto;font-size:11px;color:#aaa89f">格式：家數（佔比%）</div>
  </div>
  <div id="eff-content"></div>
</div>

<!-- 小組效率分析 -->
<div class="panel" id="panel-team">
  <div class="period-bar">
    <div class="period-label">課別</div>
    <div class="period-tabs" id="team-course-tabs"></div>
    <div class="period-range">統計區間：115/04/02 ～ 115/04/14</div>
  </div>
  <div id="team-content"></div>
</div>

<!-- 部門損益分析 -->
<div class="panel" id="panel-pnl">
  <div class="coming-panel">
    <div class="cs-label">部門損益分析</div>
    <div class="cs-hint">全部門・一部・二部・業務部</div>
  </div>
</div>

<script>
const KPI = 0.0006;
const TITLE_ORDER = ['經理','課長','助理高專','資深專員','專員','事務專員','中階助理','初階助理'];
const SPECIALIST   = new Set(['經理','課長','助理高專','資深專員','專員','事務專員']);

/* <<DASHBOARD_DATA_START>> */
// ── 品質：最近 4 週資料 ──────────────────────────────────
const qualityPeriods = [
  { key:'w1', label:'03/02～03/18', range:'115/03/02 ～ 115/03/18',
    dept:[
      {short:'一部',color:'#1D9E75',人數:108,品項率:0.00042,件數率:0.00029,金額率:0.00026},
      {short:'二部',color:'#378ADD',人數:70, 品項率:0.00028,件數率:0.00029,金額率:0.00026},
    ],

// Helpers
// ══════════════════════════════════════════════════════
function fmt(v){ return (v*100).toFixed(4)+'%'; }
function qcls(v){ return v<KPI*0.5?'ok':v<KPI?'warn':'over'; }
// 個人誤盤率已是 % 值（0.069 = 0.069%），門檻對齊 KPI：< 0.03% ok, 0.03~0.06% warn, > 0.06% over
function qcls2(v){ if(v===null) return ''; return v<0.03?'ok':v<0.06?'warn':'over'; }
function fmtErr(v){ if(v===null) return '<span class="q-person-nc">-</span>'; return `<span class="${qcls2(v)}">${v.toFixed(3)}%</span>`; }
function bColor(c){ return c==='ok'?'#1D9E75':c==='warn'?'#EF9F27':'#E24B4A'; }
function barW(v){ return Math.min(v/(KPI*2)*100,100).toFixed(1); }
const kpiPct='50.0';
function fmtMin(m){ if(!m)return'-'; const h=Math.floor(m/60),mn=Math.round(m%60); return h>0?`${h}h${mn}m`:`${mn}m`; }
function fmtMoney(v){ return Math.round(v/10000)+'萬'; }
function lt3cls(p){ return p>=35?'pct-high':p>=20?'pct-mid':'pct-low'; }
function cTotal(cv){ return Object.values(cv).reduce((s,n)=>s+n,0); }
function cSpec(cv){ return Object.entries(cv).filter(([t])=>SPECIALIST.has(t)).reduce((s,[,n])=>s+n,0); }
function specCls(p){ return p>=85?'spec-high':p>=70?'spec-mid':'spec-low'; }
function specBg(p){ return p>=85?'#1D9E75':p>=70?'#EF9F27':'#E24B4A'; }

// ══════════════════════════════════════════════════════
// Headcount
// ══════════════════════════════════════════════════════
function buildHeadcount(){
  let totalAll=0, totalField=0, totalSpec=0;
  Object.entries(hcData).forEach(([,dv])=>{
    const dt = dv.manager + Object.values(dv.courses).reduce((s,cv)=>s+cTotal(cv),0);
    const ds = 1 + Object.values(dv.courses).reduce((s,cv)=>s+cSpec(cv),0);
    totalAll += dt;
    if(dv.type==='field') totalField += dt;
    totalSpec += ds;
  });
  const maxC = Math.max(...Object.values(hcData).flatMap(dv=>Object.values(dv.courses).map(cTotal)));

  let html = `<div class="info-bar">
    <div class="info-card"><div class="info-val">${totalAll}</div><div class="info-lbl">全中心總人數</div><div class="info-date">截至 ${HC_DATE}</div></div>
    <div class="info-card"><div class="info-val">${totalField}</div><div class="info-lbl">外勤人員</div><div class="info-date">截至 ${HC_DATE}</div></div>
    <div class="info-card"><div class="info-val">${totalAll-totalField}</div><div class="info-lbl">內勤人員</div><div class="info-date">截至 ${HC_DATE}</div></div>
    <div class="info-card"><div class="info-val">3</div><div class="info-lbl">部門數</div></div>
    <div class="info-card"><div class="info-val">${Math.round(totalSpec/totalAll*100)}%</div><div class="info-lbl">全中心專員佔比</div><div class="info-date">截至 ${HC_DATE}</div></div>
  </div>`;

  html += `<div class="legend-row">
    <span style="font-size:11px;color:#aaa89f;font-weight:500;margin-right:4px">專員類：</span>
    ${['經理','課長','助理高專','資深專員','專員','事務專員'].map(t=>`<span class="title-pill pill-${t}">${t}</span>`).join('')}
    <span style="font-size:11px;color:#aaa89f;font-weight:500;margin-left:12px;margin-right:4px">助理類：</span>
    ${['中階助理','初階助理'].map(t=>`<span class="title-pill pill-${t}">${t}</span>`).join('')}
    <span style="margin-left:auto;font-size:10px;color:#aaa89f">人力資料截至 ${HC_DATE}</span>
  </div>`;

  Object.entries(hcData).forEach(([deptKey,dv])=>{

// Quality – 點擊課別展開個人明細
// ══════════════════════════════════════════════════════
function toggleCourseDetail(dept, course, panelId){
  const panel = document.getElementById(panelId);
  const tog   = document.getElementById('tog-' + panelId);
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    if(tog) tog.textContent = '▶';
    return;
  }
  // 同一部門其他展開的關掉
  panel.closest('.q-dept-block').querySelectorAll('.q-person-panel.open').forEach(p=>{
    p.classList.remove('open');
    const t = document.getElementById('tog-' + p.id);
    if(t) t.textContent = '▶';
  });

  // 比對課名（忽略括號備注，如「北二課(不計入)」也算北二課）
  const baseName = course.replace(/[\(（][^\)）]*[\)）]/g,'').trim();
  const persons  = qualityPersonData.filter(d =>
    d.dept === dept &&
    d.course.replace(/[\(（][^\)）]*[\)）]/g,'').trim() === baseName
  );

  if(!persons.length){
    panel.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:#545770">無個人明細資料</div>';
    panel.classList.add('open');
    if(tog) tog.textContent = '▼';
    return;
  }

  // 依品項誤盤率由低至高排序（null 排最後）
  const sorted = [...persons].sort((a,b)=>{
    if(a.errItem===null && b.errItem===null) return 0;
    if(a.errItem===null) return 1;
    if(b.errItem===null) return -1;
    return a.errItem - b.errItem;
  });

  const rows = sorted.map(p=>{
    const isNC = p.course !== course && (p.course.includes('不計入') || p.course.includes('未計入'));
    const ncTag = isNC ? `<span style="font-size:9px;color:#545770;margin-left:4px">(不計入)</span>` : '';
    const zeroWorks = p.stores === 0;
    return `<tr style="${isNC?'opacity:0.55':''}">
      <td>${p.name}${ncTag}${zeroWorks?'<span class="q-person-nc"> 未作業</span>':''}</td>
      <td>${p.title}</td>
      <td style="color:#8890b0">${p.stores}</td>
      <td>${p.stores>0 ? p.avgItem.toLocaleString() : '<span class="q-person-nc">-</span>'}</td>
      <td>${p.stores>0 ? p.avgQty.toLocaleString() : '<span class="q-person-nc">-</span>'}</td>
      <td>${p.stores>0 ? Math.round(p.avgAmt).toLocaleString() : '<span class="q-person-nc">-</span>'}</td>
      <td>${fmtErr(p.errItem)}</td>
      <td>${fmtErr(p.errQty)}</td>
      <td>${fmtErr(p.errAmt)}</td>
    </tr>`;
  }).join('');

  // 有不計入的備注
  const ncCount = persons.filter(p=>p.course!==course).length;
  const noteHtml = ncCount
    ? `<div class="q-person-footer">※ 含 ${ncCount} 位標記為「不計入」人員（以半透明顯示）</div>`
    : '';

  panel.innerHTML = `<table class="q-person-table">
    <thead><tr>
      <th>姓名</th><th>職稱</th><th>已盤店</th>
      <th>平均品項</th><th>平均數量</th><th>平均金額</th>
      <th>品項誤盤率</th><th>件數誤盤率</th><th>金額誤盤率</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>${noteHtml}`;

  panel.classList.add('open');
  if(tog) tog.textContent = '▼';
}

// Team Analysis
// ══════════════════════════════════════════════════════
const COURSE_ORDER = ['北一課','北二課','北三課','北四課','桃竹課','台中課','嘉南課','高屏課'];
const COURSE_COLOR = {
  '北一課':'#1D9E75','北二課':'#1D9E75','北三課':'#1D9E75','北四課':'#1D9E75','桃竹課':'#1D9E75',
  '台中課':'#378ADD','嘉南課':'#378ADD','高屏課':'#378ADD'
};
let currentTeamCourse = '北一課';

function buildTeamTabs(){
  document.getElementById('team-course-tabs').innerHTML = COURSE_ORDER.map(c =>
    `<div class="period-tab${c===currentTeamCourse?' active':''}" onclick="selectTeamCourse('${c}')">${c}</div>`
  ).join('');
}

function selectTeamCourse(c){ currentTeamCourse=c; buildTeamTabs(); buildTeamContent(); }

// 效率指數 = 每萬元庫存花幾分鐘，越低越好（排除店鋪大小影響）
function calcEffIdx(avgMin, avgInv){ return avgMin / (avgInv / 10000); }
function effCls(v, avg){ return v < avg*0.92 ? 'eff-fast' : v > avg*1.08 ? 'eff-slow' : 'eff-avg'; }

function buildTeamContent(){
  const course = currentTeamCourse;
  const accColor = document.getElementById('tab-team').dataset.color || '#f4874a';

  // 效率指數 = 耗時 × 人數 ÷ (庫存/萬)，單位：人·分/萬，越低越好
  const persons = teamPersonData
    .filter(d=>d.course===course)
    .map(p=>({...p, effIdx: p.avgMin * p.avgPpl / (p.avgInv/10000)}))
    .sort((a,b)=>a.effIdx-b.effIdx);

  const combos = teamComboData
    .filter(d=>d.course===course)
    .map(c=>({...c, effIdx: c.avgMin * c.avgPpl / (c.avgInv/10000)}))
    .sort((a,b)=>b.n-a.n||a.effIdx-b.effIdx);

  if(!persons.length){ document.getElementById('team-content').innerHTML='<div style="padding:40px;text-align:center;color:#545770">無資料</div>'; return; }

  const avgEffIdx = persons.reduce((s,p)=>s+p.effIdx,0)/persons.length;
  const avgMin    = persons.reduce((s,p)=>s+p.avgMin,0)/persons.length;
  const n25 = Math.ceil(persons.length*0.25);
  const n75 = Math.floor(persons.length*0.75);

  // 帶組vs成員效率比較
  const leaders  = persons.filter(p=>p.ldrPct>=50);
  const members  = persons.filter(p=>p.ldrPct<50);
  const ldrAvg   = leaders.length  ? leaders.reduce((s,p)=>s+p.effIdx,0)/leaders.length  : null;
  const memAvg   = members.length  ? members.reduce((s,p)=>s+p.effIdx,0)/members.length  : null;

  const personRows = persons.map((p,i)=>{
    const isTop = i < n25, isBot = i >= n75;
    const rankCls = isTop?'rank-top':isBot?'rank-bot':'rank-mid';
    const chipBg  = isTop?'#162a22':isBot?'#2a1520':'#1e2030';
    const chipCol = isTop?'#2dd4a0':isBot?'#e05c6e':'#7b7f96';
    const cls = effCls(p.effIdx, avgEffIdx);
    const badge = cls==='eff-fast'?'效率佳':cls==='eff-slow'?'待改善':'一般';
    const ldrTag = p.ldrPct>=50
      ? `<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:#2a2040;color:#c084fc;margin-left:3px;font-weight:600">帶</span>`
      : '';
    return `<tr>
      <td><span class="team-rank ${rankCls}">${i+1}</span></td>
      <td><span class="name-chip" style="background:${chipBg};color:${chipCol}">${p.name}</span>${ldrTag}</td>
      <td style="color:#8890b0">${p.n}</td>
      <td style="font-size:11px">${fmtMin(p.avgMin)}<br><span style="color:#8890b0">${p.avgPpl.toFixed(1)}人・${Math.round(p.avgInv/10000)}萬</span></td>
      <td><span class="eff-idx-val ${cls}">${p.effIdx.toFixed(2)}</span><br><span class="eff-idx-unit">人·分/萬</span></td>
      <td><span class="eff-badge ${cls}">${badge}</span></td>
    </tr>`;
  }).join('');

  const comboRows = combos.map(c=>{
    const cls = effCls(c.effIdx, avgEffIdx);
    const badge = cls==='eff-fast'?'效率佳':cls==='eff-slow'?'待改善':'一般';
    const chars = [...c.combo].map(ch=>`<span class="char-dot">${ch}</span>`).join('');
    return `<tr>
      <td><div class="combo-chip">${chars}</div></td>
      <td style="color:#8890b0">${c.n}</td>
      <td style="font-size:11px">${fmtMin(c.avgMin)}<br><span style="color:#8890b0">${c.avgPpl.toFixed(1)}人・${Math.round(c.avgInv/10000)}萬</span></td>
      <td><span class="eff-idx-val ${cls}">${c.effIdx.toFixed(2)}</span><br><span class="eff-idx-unit">人·分/萬</span></td>
      <td><span class="eff-badge ${cls}">${badge}</span></td>
    </tr>`;
  }).join('');

  // 帶組 vs 成員 比較摘要
  let ldrVsMemHtml = '';
  if(ldrAvg !== null && memAvg !== null){
    const diff = ((ldrAvg - memAvg)/memAvg*100).toFixed(1);
    const diffColor = ldrAvg > memAvg ? '#e05c6e' : '#2dd4a0';
    const diffText = ldrAvg > memAvg
      ? `帶組人員效率指數平均比成員高 ${Math.abs(diff)}%（較慢，反映帶組額外工作量）`
      : `帶組人員效率指數平均比成員低 ${Math.abs(diff)}%（較快）`;
    ldrVsMemHtml = `
    <div class="legend-row" style="margin-top:0">
      <span style="font-size:11px;color:#d8a8ff;font-weight:600">帶組分析</span>
      <span style="font-size:11px;color:#8890b0;margin-left:8px">帶組（帶 ≥50%場次）均值：<strong style="color:#d8a8ff">${ldrAvg.toFixed(2)}</strong> 人·分/萬</span>
      <span style="font-size:11px;color:#8890b0">成員均值：<strong style="color:#a0a4bc">${memAvg.toFixed(2)}</strong> 人·分/萬</span>
      <span style="font-size:11px;color:${diffColor};font-weight:500">${diffText}</span>
    </div>`;
  }

  document.getElementById('team-content').innerHTML = `
  <div class="legend-row">
    <span class="eff-badge eff-fast">效率佳</span><span style="font-size:11px;color:#8890b0;margin:0 12px 0 4px">低於課均 8% ↑</span>
    <span class="eff-badge eff-avg">一般</span><span style="font-size:11px;color:#8890b0;margin:0 12px 0 4px">課均 ±8%</span>
    <span class="eff-badge eff-slow">待改善</span><span style="font-size:11px;color:#8890b0;margin:0 4px 0 4px">高於課均 8% ↑</span>
    <span style="margin-left:8px;font-size:9px;padding:1px 5px;border-radius:8px;background:#2a2040;color:#d8a8ff;font-weight:600">帶</span><span style="font-size:11px;color:#8890b0;margin-left:4px">帶組比例 ≥50%</span>
    <div style="margin-left:auto;font-size:11px;color:#8890b0">效率指數＝耗時×人數÷(庫存/萬)・課均 ${avgEffIdx.toFixed(2)} 人·分/萬</div>
  </div>
  ${ldrVsMemHtml}
  <div class="team-grid">
    <div class="team-section">
      <div class="team-section-header" style="border-left:3px solid ${accColor}">
        個人效率排行<span class="team-section-sub">效率指數由低至高（最快在前）・${persons.length} 人</span>
      </div>
      <table class="team-table">
        <thead><tr><th>#</th><th>代號</th><th>場次</th><th>耗時・人數・庫存</th><th>效率指數</th><th>評比</th></tr></thead>
        <tbody>${personRows}</tbody>
      </table>
      <div class="team-note">※ 效率指數 = 平均耗時 × 平均人數 ÷ (庫存/萬)，同時排除店鋪大小與人力多寡的影響；「帶」代表帶組比例 ≥50%</div>
    </div>
    <div class="team-section">
      <div class="team-section-header" style="border-left:3px solid ${accColor}">
        常見組合分析<span class="team-section-sub">出場 ≥ 2 次・${combos.length} 組</span>
      </div>
      <table class="team-table">
        <thead><tr><th>組合</th><th>場次</th><th>耗時・人數・庫存</th><th>效率指數</th><th>評比</th></tr></thead>
        <tbody>${comboRows}</tbody>
      </table>
      <div class="team-note">※ 每個色圈代表一位人員；組合為同場次出現的完整小組</div>
    </div>
  </div>`;
}

// Tab switch
// ══════════════════════════════════════════════════════
function setTab(key){
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.remove('active');
    t.style.borderBottomColor = 'transparent';
    t.style.color = '';
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const tab = document.getElementById('tab-'+key);
  tab.classList.add('active');
  const accent = tab.dataset.color || '#9b7ef0';
  tab.style.borderBottomColor = accent;
  tab.style.color = accent;
  document.getElementById('panel-'+key).classList.add('active');
  // sync period-tab active color per section
  document.querySelectorAll('.period-tab.active').forEach(pt=>{ pt.style.background=accent+'22'; pt.style.color=accent; pt.style.borderColor=accent+'55'; });
}
